{% block content %}
<div class="container-fluid fondo px-4 ">
    <div class="row ms-4">
        <div class="breadcrumb-container">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('index') }}">Inicio</a></li>
                <li class="breadcrumb-item active">Dashboard de Proyectos</li>
            </ol>
        </div>
    </div>

    <div class="row m-0">
        <div class="container-xl m-0" id="alert-container"></div>
    </div>

    <div class="row pb-3 align-items-start">

        <div class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="card-title mb-0">Tus proyectos</h4>
                        <a href="{{ url_for('anadir') }}" class="btn btn-primary rounded-circle p-0" style="width: 38px; height: 38px; line-height: 38px;">
                            <i class="bi bi-plus fs-5"></i>
                        </a>
                    </div>
                    <div class="list-group" id="proyectos-list">
                        <div class="text-center p-3">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Cargando...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-8 mt-4 mt-lg-0">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">Dependencias del Proyecto Activo</h5>
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th scope="col">Dependencia</th>
                                    <th scope="col">Versión</th>
                                    <th scope="col">Vulnerabilidad</th>
                                    <th scope="col">Nivel de Riesgo</th>
                                </tr>
                            </thead>
                            <tbody id="dependencias-body">
                                <tr>
                                    <td colspan="4" class="text-center text-muted">Seleccione un proyecto para ver sus dependencias.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row pb-4">
        <div class="col-12 d-flex justify-content-end gap-2">
            <button id="informe-pdf-btn" class="btn btn-secondary" disabled>
                <i class="bi bi-file-earmark-pdf"></i> Informe PDF
            </button>
            <button id="sbom-btn" class="btn btn-dark" disabled>
                <i class="bi bi-file-zip"></i> Descargar SBOM
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

<script>
    const API_BASE_URL = 'http://localhost:5001';
    const proyectoSeleccionadoId = {{ chat_seleccionado|default('null') }};

    function obtenerToken() {
        return localStorage.getItem('access_token');
    }

    function mostrarAlerta(mensaje, tipo = 'danger') {
        const alertContainer = document.getElementById("alert-container");
        alertContainer.innerHTML = `
            <div class="alert alert-${tipo} alert-dismissible fade show" role="alert">
                ${mensaje}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>`;
    }

    // CARGAR LISTA DE PROYECTOS (COLUMNA IZQUIERDA)
    async function cargarProyectos() {
        const proyectosList = document.getElementById("proyectos-list");
        proyectosList.innerHTML = ''; // Limpiar lista
        try {
            const token = obtenerToken();
            const response = await fetch(`${API_BASE_URL}/proyectos`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
            const proyectos = await response.json();

            if (proyectos.length === 0) {
                proyectosList.innerHTML = '<p class="text-center text-muted">No tienes proyectos. ¡Crea uno nuevo!</p>';
                return;
            }

            proyectos.forEach(proyecto => {
                const isActive = proyecto.id === proyectoSeleccionadoId;
                const item = document.createElement("div");
                item.className = `list-group-item list-group-item-action d-flex justify-content-between align-items-center ${isActive ? 'active' : ''}`;
                
                const nombreProyecto = proyecto.nombre;
                item.innerHTML = `
                    <div class="flex-grow-1">
                        <strong>${nombreProyecto}</strong>
                    </div>
                    <div class="btn-group" role="group">
                        <a href="/chat/${proyecto.id}" class="btn btn-sm btn-outline-primary">Acceder</a>
                        <a href="/proyecto/editar/${proyecto.id}" class="btn btn-sm btn-outline-secondary">Editar</a>
                        <button class="btn btn-sm btn-outline-danger btn-eliminar" data-id="${proyecto.id}" data-nombre="${nombreProyecto}">Borrar</button>
                    </div>
                `;
                proyectosList.appendChild(item);
            });
            
            // Agregar event listeners para los botones de eliminar
            document.querySelectorAll('.btn-eliminar').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-id');
                    const nombre = this.getAttribute('data-nombre');
                    eliminarProyecto(id, nombre);
                });
            });
        } catch (error) {
            console.error("Error al cargar los proyectos:", error);
            mostrarAlerta("No se pudieron cargar tus proyectos. Por favor, recarga la página.");
        }
    }

    // FUNCIÓN PARA ELIMINAR PROYECTO
    async function eliminarProyecto(proyectoId, nombreProyecto) {
        if (!confirm(`¿Estás seguro de que quieres eliminar el proyecto "${nombreProyecto}"? Esta acción no se puede deshacer.`)) {
            return;
        }

        try {
            const token = obtenerToken();
            const response = await fetch(`${API_BASE_URL}/proyectos/${proyectoId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || `Error HTTP: ${response.status}`);
            }

            const result = await response.json();
            mostrarAlerta(result.message, 'success');
            
            // Recargar la lista de proyectos
            cargarProyectos();
            
            // Si el proyecto eliminado era el seleccionado, limpiar la tabla de dependencias
            if (proyectoId == proyectoSeleccionadoId) {
                const dependenciasBody = document.getElementById("dependencias-body");
                dependenciasBody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">Seleccione un proyecto para ver sus dependencias.</td></tr>`;
                document.getElementById('informe-pdf-btn').disabled = true;
                document.getElementById('sbom-btn').disabled = true;
            }
            
        } catch (error) {
            console.error("Error al eliminar el proyecto:", error);
            mostrarAlerta(`Error al eliminar el proyecto: ${error.message}`, 'danger');
        }
    }

    // CARGAR TABLA DE DEPENDENCIAS (COLUMNA DERECHA)
    async function cargarDependencias(proyectoId) {
        if (!proyectoId) return;

        const dependenciasBody = document.getElementById("dependencias-body");
        dependenciasBody.innerHTML = `<tr><td colspan="4" class="text-center"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Cargando...</span></div></td></tr>`;
        
        // Habilitar botones de acción
        document.getElementById('informe-pdf-btn').disabled = false;
        document.getElementById('sbom-btn').disabled = false;

        try {
            const token = obtenerToken();
            const response = await fetch(`${API_BASE_URL}/proyectos/${proyectoId}/dependencias`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!response.ok) {
                 if(response.status === 404) {
                    dependenciasBody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">No se encontraron dependencias para este proyecto. Sube un archivo .zip para analizarlas.</td></tr>`;
                    return;
                }
                throw new Error(`Error HTTP: ${response.status}`);
            }

            const data = await response.json();
            const dependencias = data.dependencias;
            dependenciasBody.innerHTML = ''; // Limpiar tabla

            if (dependencias.length === 0) {
                dependenciasBody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">Este proyecto no tiene dependencias registradas.</td></tr>`;
                return;
            }
            
            dependencias.forEach(dep => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${dep.nombre}</td>
                    <td>${dep.version || 'No especificada'}</td>
                    <td>N/A</td> <td>N/A</td> `;
                dependenciasBody.appendChild(row);
            });
        } catch (error) {
            console.error("Error al cargar las dependencias:", error);
            dependenciasBody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">Error al cargar las dependencias.</td></tr>`;
        }
    }

    // LÓGICA DE LOS BOTONES DE ACCIÓN
    document.getElementById('informe-pdf-btn').addEventListener('click', () => {
        if (!proyectoSeleccionadoId) {
            mostrarAlerta('Primero selecciona un proyecto.', 'warning');
            return;
        }
        alert(`Funcionalidad de generar PDF para el proyecto ${proyectoSeleccionadoId} no implementada.`);
        // Lógica para generar PDF con jsPDF y jsPDF-autotable
        // const { jsPDF } = window.jspdf;
        // const doc = new jsPDF();
        // doc.autoTable({ html: '#dependencias-table' }); // Asumiendo que la tabla tiene id="dependencias-table"
        // doc.save(`informe-proyecto-${proyectoSeleccionadoId}.pdf`);
    });

    document.getElementById('sbom-btn').addEventListener('click', () => {
         if (!proyectoSeleccionadoId) {
            mostrarAlerta('Primero selecciona un proyecto.', 'warning');
            return;
        }
        alert(`Funcionalidad de descargar SBOM para el proyecto ${proyectoSeleccionadoId} no implementada.`);
        // Lógica para descargar el SBOM
        // window.location.href = `${API_BASE_URL}/proyectos/${proyectoSeleccionadoId}/sbom/download`;
    });


    // INICIALIZACIÓN
    document.addEventListener('DOMContentLoaded', () => {
        cargarProyectos();
        if (proyectoSeleccionadoId) {
            cargarDependencias(proyectoSeleccionadoId);
        }
    });
</script>
{% endblock %}
