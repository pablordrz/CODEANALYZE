{% block content %}
<div class="container mt-5">
  <div class="card shadow-lg">
    <div class="card-body">
      <h1 class="card-title text-center mb-4">Crear Nuevo Proyecto</h1>
      <div id="contenido-formulario">
        <form id="nuevo-proyecto-form">
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" name="nombre" required>
          </div>

          <div class="mb-3">
            <label for="descripcion" class="form-label">Descripción</label>
            <textarea class="form-control" id="descripcion" name="descripcion" rows="4"></textarea>
          </div>

          <div class="mb-3">
            <label for="fecha" class="form-label">Fecha</label>
            <input type="date" class="form-control" id="fecha" name="fecha" required>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">Crear Proyecto</button>
          </div>
        </form>
      </div>
      <div id="mensaje" class="mt-3"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const API_BASE_URL = 'http://localhost:5001';
  function obtenerToken() {
    return localStorage.getItem('access_token') || sessionStorage.getItem('access_token');
  }
  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("nuevo-proyecto-form");
    
    // Establecer la fecha actual como valor por defecto
    const today = new Date().toISOString().split('T')[0];
    document.getElementById("fecha").value = today;
  
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
  
      const token = obtenerToken();
      if (!token) {
        mostrarMensaje('Token no encontrado. Por favor inicia sesión.', 'danger');
        return;
      }
  
      const submitButton = form.querySelector('button[type="submit"]');
      submitButton.disabled = true;
      submitButton.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Creando...';
  
      try {
        const formData = new FormData(form);
        const body = {
          nombre: formData.get('nombre'),
          descripcion: formData.get('descripcion'),
          fecha: formData.get('fecha')
          // usuario_id puede omitirse si el backend lo infiere del token
        };
  
        const response = await fetch(`${API_BASE_URL}/proyectos`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify(body)
        });
  
        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.message || `Error al crear el proyecto: ${response.status}`);
        }
  
        const data = await response.json();
        mostrarMensaje("Proyecto creado con éxito.", 'success');
        form.reset();
  
        setTimeout(() => {
          window.location.href = `/chat/${data.id}`;
        }, 2000);
      } catch (error) {
        mostrarMensaje(`Error: ${error.message}`, 'danger');
        submitButton.disabled = false;
        submitButton.innerHTML = 'Crear Proyecto';
      }
    });
  });
  
  function mostrarMensaje(mensaje, tipo) {
    const mensajeDiv = document.getElementById("mensaje");
    mensajeDiv.innerHTML = `
      <div class="alert alert-${tipo} alert-dismissible fade show" role="alert">
        ${mensaje}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    `;
  }
</script>
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
